spring.application.name=Expense Tracker

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
jwt.secret=

spring.cache.type=redis
spring.redis.host=localhost
spring.redis.port=6379

bucket4j.enabled=true
bucket4j.cache-to-use=jcache
bucket4j.filters[0].cache-name=rate-limit-cache
bucket4j.filters[0].url=.*
bucket4j.filters[0].rate-limits[0].bandwidths[0].capacity=5
bucket4j.filters[0].rate-limits[0].bandwidths[0].time=1
bucket4j.filters[0].rate-limits[0].bandwidths[0].unit=minutes

bucket4j.filters[0].rate-limits[0].deny-request=true
bucket4j.filters[0].rate-limits[0].http-status-code=429
bucket4j.filters[0].rate-limits[0].http-response-body=Too many requests
bucket4j.filters[0].rate-limits[0].http-content-type=text/plain

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=expense-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest